<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Titu Movies | PRO Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; background: #111; border: 1px solid #333; color: #fff; }
        button { background: #e67e22; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div id="movieForm">
            <h3>Add/Fetch Movie</h3>
            <input type="text" id="tmdbId" placeholder="TMDb ID">
            <button onclick="fetchMovie()">Auto Fetch Data</button>
            <input type="text" id="mTitle" placeholder="Title">
            <select id="mCat"></select>
            <input type="text" id="mStream" placeholder="Stream URL">
            <input type="text" id="dl720" placeholder="720p Download">
            <input type="text" id="dl1080" placeholder="1080p Download">
            <button onclick="saveMovie()">SAVE MOVIE</button>
        </div>
        <div id="userControl">
            <h3>Users</h3>
            <div id="uList"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBdDxTR0Rsm2cgYRr9lMZXkd0rc7VBmhZg",
        authDomain: "titu-movies.firebaseapp.com",
        projectId: "titu-movies",
        storageBucket: "titu-movies.firebasestorage.app",
        messagingSenderId: "128123629260",
        appId: "1:128123629260:web:d60babebdf14d625571c69"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. Fetch Categories
    db.collection("categories").onSnapshot(s => {
        const drop = document.getElementById('mCat');
        drop.innerHTML = "";
        s.forEach(doc => drop.innerHTML += `<option>${doc.data().name}</option>`);
    });

    // 2. Fetch Movie Data
    async function fetchMovie() {
        const id = document.getElementById('tmdbId').value;
        const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=91eebcbca31321a0b6f7b54e6bf377b0`).then(r => r.json());
        if(res.title) {
            document.getElementById('mTitle').value = res.title;
        } else { alert("ID Error!"); }
    }

    // 3. Save Movie
    async function saveMovie() {
        await db.collection("movies").add({
            title: document.getElementById('mTitle').value,
            category: document.getElementById('mCat').value,
            stream_url: document.getElementById('mStream').value,
            download_720: document.getElementById('dl720').value,
            download_1080: document.getElementById('dl1080').value
        });
        alert("Saved!");
    }

    // 4. Ban User
    db.collection("users").onSnapshot(s => {
        const list = document.getElementById('uList');
        list.innerHTML = "";
        s.forEach(doc => {
            list.innerHTML += `<div>${doc.data().email} <button onclick="db.collection('users').doc('${doc.id}').update({status:'banned'})">BAN</button></div>`;
        });
    });
</script>
</body>
</html>
