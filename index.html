<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titu Movies - Premium Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Premium Deep Black & Orange Theme --- */
        :root {
            --deep-black: #030303;
            --surface-dark: #121212;
            --surface-glass: rgba(26, 26, 26, 0.8);
            --orange-light: #FFFFB74D;
            --orange-dark: #FFFF9800;
            --text-gray: #AAAAAA;
            --white: #FFFFFF;
            --tmdb-blue: #01b4e4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--deep-black);
            color: var(--white);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-weight: 800;
            margin: 0;
            background: -webkit-linear-gradient(left, var(--orange-light), var(--orange-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 36px;
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Form Section */
        .form-section {
            flex: 1;
            background: var(--surface-glass);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid #222;
        }

        .form-section h2 {
            margin-top: 0;
            color: var(--orange-light);
            font-size: 20px;
        }

        /* TMDB Importer Box */
        .tmdb-box {
            background: rgba(1, 180, 228, 0.1);
            border: 1px solid var(--tmdb-blue);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .tmdb-box input {
            flex: 1;
            margin: 0;
            border-color: var(--tmdb-blue);
        }

        .tmdb-box button {
            width: auto;
            margin: 0;
            background: var(--tmdb-blue);
            color: white;
            padding: 12px 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, select {
            background: #1a1a1a;
            border: 1px solid #333;
            color: var(--white);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--orange-dark);
            box-shadow: 0 0 8px rgba(255, 152, 0, 0.3);
        }

        .hint {
            font-size: 10px;
            color: #777;
            margin-top: 3px;
        }

        button {
            background: linear-gradient(to right, var(--orange-light), var(--orange-dark));
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* List Section */
        .list-section {
            flex: 1;
            background: var(--surface-dark);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #222;
            height: 800px;
            overflow-y: auto;
        }

        .movie-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid var(--orange-dark);
        }

        .movie-card img {
            width: 50px;
            height: 70px;
            border-radius: 5px;
            object-fit: cover;
        }

        .movie-info {
            flex: 1;
        }

        .movie-info h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
        }

        .movie-info p {
            margin: 0;
            font-size: 12px;
            color: var(--text-gray);
        }

        .delete-btn {
            background: #ff3d00;
            color: white;
            padding: 8px 12px;
            width: auto;
            margin: 0;
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .tmdb-box { flex-direction: column; }
            .tmdb-box button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TITU MOVIES ADMIN</h1>
        <p style="color: var(--text-gray); font-size: 14px;">Upload Movies & Series Directly to App</p>
    </div>

    <div class="container">
        <div class="form-section">
            
            <div class="tmdb-box">
                <input type="text" id="tmdbSearchInput" placeholder="Search Movie / Series on TMDb...">
                <button type="button" onclick="fetchTMDBData()">Fetch Auto-Data 🚀</button>
            </div>

            <h2>+ Add New Content</h2>
            <form id="addMovieForm">
                <div class="form-grid">
                    
                    <div class="form-group full-width">
                        <label>Title</label>
                        <input type="text" id="title" placeholder="e.g. Pushpa 2: The Rule" required>
                    </div>

                    <div class="form-group">
                        <label>Dynamic Category</label>
                        <input type="text" id="category" placeholder="e.g. Action, Series, Bollywood" required>
                        <span class="hint">App me isi naam se row banegi</span>
                    </div>

                    <div class="form-group">
                        <label>Language</label>
                        <input type="text" id="language" placeholder="e.g. Hindi, English" required>
                    </div>

                    <div class="form-group">
                        <label>Release Year</label>
                        <input type="text" id="release_year" placeholder="e.g. 2026" required>
                    </div>

                    <div class="form-group">
                        <label>IMDb Rating</label>
                        <input type="text" id="rating" placeholder="e.g. 8.5" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Portrait Poster URL (Standard)</label>
                        <input type="url" id="poster_url" placeholder="https://..." required>
                    </div>

                    <div class="form-group full-width">
                        <label>Landscape Backdrop URL (Hero Slider ke liye)</label>
                        <input type="url" id="backdrop_url" placeholder="https://...">
                    </div>

                    <div class="form-group full-width">
                        <label>Stream URL (M3U8 / MP4 for Player)</label>
                        <input type="url" id="stream_url" placeholder="https://..." required>
                    </div>

                    <div class="form-group full-width">
                        <label style="color: var(--orange-light);">⬇️ 480p Download Link (Optional)</label>
                        <input type="url" id="download_480" placeholder="https://...">
                    </div>

                    <div class="form-group full-width">
                        <label style="color: var(--orange-light);">⬇️ 720p Download Link (Optional)</label>
                        <input type="url" id="download_720" placeholder="https://...">
                    </div>

                    <div class="form-group full-width">
                        <label style="color: var(--orange-light);">⬇️ 1080p Download Link (Optional)</label>
                        <input type="url" id="download_1080" placeholder="https://...">
                        <span class="hint">Jo link khali chhodenge, app me uska button nahi dikhega!</span>
                    </div>

                </div>
                <button type="submit">Upload to Titu Movies App</button>
            </form>
        </div>

        <div class="list-section">
            <h2>Live App Data (<span id="movieCount">0</span>)</h2>
            <div id="moviesList">
                <p style="color: #777; text-align: center; margin-top: 50px;">Loading data...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // --- TMDb AUTO IMPORTER SCRIPT ---
      // --- TMDb AUTO IMPORTER (UPGRADED: Supports Name, TMDb ID, and IMDb ID) ---
async function fetchTMDBData() {
    const input = document.getElementById('tmdbSearchInput').value.trim();
    if (!input) {
        alert("Kuch toh enter karo bhai!");
        return;
    }

    const apiKey = "91eebcbca31321a0b6f7b54e6bf377b0";
    let url;

    // Check if input is an IMDb ID (starts with tt)
    if (input.startsWith("tt")) {
        url = `https://api.themoviedb.org/3/find/${input}?api_key=${apiKey}&external_source=imdb_id&language=en-US`;
    } 
    // Check if input is a pure numeric TMDb ID
    else if (!isNaN(input)) {
        url = `https://api.themoviedb.org/3/movie/${input}?api_key=${apiKey}&language=en-US`;
    } 
    // Otherwise, search by name
    else {
        url = `https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${encodeURIComponent(input)}&language=en-US`;
    }

    try {
        const response = await fetch(url);
        const data = await response.json();

        let item = null;

        // Extracting item based on input type
        if (input.startsWith("tt")) {
            item = data.movie_results?.[0] || data.tv_results?.[0];
        } else if (!isNaN(input)) {
            item = data; // Pure TMDb ID response is direct
        } else {
            item = data.results?.find(x => x.media_type === 'movie' || x.media_type === 'tv');
        }

        if (!item) {
            alert("TMDb par is ID/Name se kuch nahi mila!");
            return;
        }

        // --- Data Extraction ---
        const title = item.title || item.name;
        const date = item.release_date || item.first_air_date || "";
        const year = date ? date.split('-')[0] : "";
        const rating = item.vote_average ? item.vote_average.toFixed(1) : "";
        
        const poster = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : "";
        const backdrop = item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : "";

        // Fill Form
        document.getElementById('title').value = title;
        document.getElementById('release_year').value = year;
        document.getElementById('rating').value = rating;
        document.getElementById('poster_url').value = poster;
        document.getElementById('backdrop_url').value = backdrop;

        alert("✅ Data Fetched from TMDb/IMDb!");

    } catch (error) {
        console.error("TMDb Error:", error);
        alert("Error: Network ya Invalid ID.");
    }
}
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBdDxTR0Rsm2cgYRr9lMZXkd0rc7VBmhZg",
            authDomain: "titu-movies.firebaseapp.com",
            projectId: "titu-movies",
            storageBucket: "titu-movies.firebasestorage.app",
            messagingSenderId: "128123629260",
            appId: "1:128123629260:web:d60babebdf14d625571c69"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- ADD MOVIE TO FIREBASE ---
        document.getElementById('addMovieForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "Uploading...";
            submitBtn.disabled = true;

            const movieData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                language: document.getElementById('language').value,
                release_year: document.getElementById('release_year').value,
                rating: document.getElementById('rating').value,
                poster_url: document.getElementById('poster_url').value,
                backdrop_url: document.getElementById('backdrop_url').value,
                stream_url: document.getElementById('stream_url').value,
                download_480: document.getElementById('download_480').value,
                download_720: document.getElementById('download_720').value,
                download_1080: document.getElementById('download_1080').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("movies").add(movieData);
                alert("Success! Movie/Series added to App.");
                e.target.reset(); // Form clear karna
                document.getElementById('tmdbSearchInput').value = ""; // Search bar bhi clear karna
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Error adding movie. Check console.");
            } finally {
                submitBtn.innerText = "Upload to Titu Movies App";
                submitBtn.disabled = false;
            }
        });

        // --- FETCH AND DISPLAY MOVIES (REAL-TIME) ---
        db.collection("movies").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const listDiv = document.getElementById('moviesList');
            document.getElementById('movieCount').innerText = snapshot.docs.length;
            listDiv.innerHTML = '';

            if(snapshot.docs.length === 0){
                listDiv.innerHTML = '<p style="color: #777; text-align: center; margin-top: 50px;">No movies added yet.</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${data.poster_url}" onerror="this.src='https://via.placeholder.com/50x70?text=No+Img'">
                    <div class="movie-info">
                        <h3>${data.title}</h3>
                        <p>Cat: <b>${data.category}</b> | Lang: ${data.language}</p>
                        <p style="color: #FFFF9800;">${data.download_720 || data.download_1080 ? '✅ Download Available' : '❌ No Download'}</p>
                    </div>
                    <button class="delete-btn" onclick="deleteMovie('${doc.id}')">Delete</button>
                `;
                listDiv.appendChild(card);
            });
        });

        // --- DELETE MOVIE ---
        window.deleteMovie = async (id) => {
            if (confirm("Are you sure you want to delete this from the App?")) {
                try {
                    await db.collection("movies").doc(id).delete();
                } catch (error) {
                    console.error("Error removing document: ", error);
                    alert("Error deleting movie.");
                }
            }
        };
    </script>
</body>
</html>
