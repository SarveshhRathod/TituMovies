<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Titu Movies | Master Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --deep-black: #030303; --orange: #FF9800; --bg: #111; }
        body { font-family: 'Poppins', sans-serif; background: #050505; color: #fff; margin: 0; padding: 20px; }
        
        /* Layout */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        
        /* Forms */
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--orange); border: none; cursor: pointer; font-weight: bold; border-radius: 6px; margin-top: 5px; }
        
        /* User List */
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .ban-btn { background: #d32f2f; width: 80px; padding: 5px; font-size: 12px; }
        .unban-btn { background: #388e3c; width: 80px; padding: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- LEFT: MOVIE UPLOADER -->
    <div class="card">
        <h3>🎬 Movie & Download Controller</h3>
        <input type="text" id="tmdbInput" placeholder="TMDb / IMDb ID...">
        <button onclick="fetchTMDBData()" style="background:#01b4e4;">Fetch Auto-Data 🚀</button>
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <input type="text" id="title" placeholder="Title">
        <input type="text" id="category" placeholder="Category (e.g. Action)">
        <input type="text" id="stream" placeholder="Stream URL">
        <input type="text" id="dl480" placeholder="480p Link">
        <input type="text" id="dl720" placeholder="720p Link">
        <input type="text" id="dl1080" placeholder="1080p Link">
        <button onclick="uploadMovie()">Publish Content</button>
    </div>

    <!-- RIGHT: USER CONTROL -->
    <div class="card">
        <h3>👥 User Management</h3>
        <div id="userList">Loading Users...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = { /* WAHI PURANA CONFIG DALEIN */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. UPLOAD MOVIE LOGIC
    async function uploadMovie() {
        const movie = {
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            stream_url: document.getElementById('stream').value,
            download_480: document.getElementById('dl480').value,
            download_720: document.getElementById('dl720').value,
            download_1080: document.getElementById('dl1080').value
        };
        await db.collection("movies").add(movie);
        alert("Published Successfully!");
    }

    // 2. USER MANAGER (BAN/UNBAN)
    db.collection("users").onSnapshot(snap => {
        const list = document.getElementById('userList');
        list.innerHTML = "";
        snap.forEach(doc => {
            const u = doc.data();
            const isBanned = u.status === "banned";
            list.innerHTML += `
                <div class="user-row">
                    <span>${u.email}</span>
                    <button class="${isBanned ? 'unban-btn' : 'ban-btn'}" onclick="toggleBan('${doc.id}', '${isBanned}')">
                        ${isBanned ? 'Unban' : 'Ban'}
                    </button>
                </div>
            `;
        });
    });

    // 3. BAN LOGIC
    window.toggleBan = (id, isBanned) => {
        db.collection("users").doc(id).update({status: isBanned === 'true' ? 'active' : 'banned'});
    };

    // 4. TMDb FETCH LOGIC (Updated)
    async function fetchTMDBData() {
        const input = document.getElementById('tmdbInput').value;
        const url = `https://api.themoviedb.org/3/find/${input}?api_key=91eebcbca31321a0b6f7b54e6bf377b0&external_source=imdb_id`;
        const res = await fetch(url).then(r => r.json());
        const item = res.movie_results[0] || res.tv_results[0];
        if(item) {
            document.getElementById('title').value = item.title || item.name;
        } else alert("Nahi mila!");
    }
</script>
</body>
</html>
