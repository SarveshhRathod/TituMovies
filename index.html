<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titu Movies - TMDb Smart Control Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bright-ruby: #FF1E46;
            --dark-charcoal: #101012;
            --pitch-black: #050506;
            --card-bg: rgba(255, 255, 255, 0.06);
            --text-dim: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--dark-charcoal), var(--pitch-black));
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 30, 70, 0.4);
        }

        header h1 span {
            color: var(--bright-ruby);
        }

        header p {
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 30, 70, 0.15);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--bright-ruby);
            box-shadow: 0 0 10px rgba(255, 30, 70, 0.2);
        }

        /* 🔍 Live Search Dropdown Styling */
        .search-results {
            position: absolute;
            top: 85px;
            left: 0;
            right: 0;
            background: #16161a;
            border: 1fr solid rgba(255, 30, 70, 0.3);
            border-radius: 10px;
            z-index: 1000;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            display: none;
        }

        .result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background 0.2s;
        }

        .result-item:hover {
            background: rgba(255, 30, 70, 0.15);
        }

        .result-item img {
            width: 40px;
            height: 55px;
            object-fit: cover;
            border-radius: 4px;
        }

        .result-details {
            display: flex;
            flex-direction: column;
        }

        .result-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .result-date {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Preview Badges for Posters */
        .preview-box {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            margin-top: 10px;
        }

        .preview-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--bright-ruby); }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn-submit {
            background: var(--bright-ruby);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 30, 70, 0.3);
        }

        .status-bar {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-success {
            background: rgba(0, 200, 81, 0.15);
            border: 1px solid rgba(0, 200, 81, 0.5);
            color: #00C851;
        }

        .status-error {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.5);
            color: #FF4444;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TITU<span>MOVIES</span></h1>
        <p>Control Room • TMDb Live Smart Fetch Engine</p>
    </header>

    <div class="form-card">
        <form id="movieForm">
            <div class="form-grid">
                
                <div class="form-group full-width">
                    <label for="searchTitle">Search Movie / Series (Type to Autofill)</label>
                    <input type="text" id="searchTitle" placeholder="Start typing name... e.g., Pushpa, Inception" autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                </div>

                <div class="form-group full-width">
                    <label for="title">Confirmed Media Title</label>
                    <input type="text" id="title" placeholder="Selected title will appear here" required readonly>
                </div>

                <div class="form-group">
                    <label for="category">Category / Genre</label>
                    <input type="text" id="category" placeholder="Action, Drama, Thriller" required>
                </div>

                <div class="form-group">
                    <label for="section">App Section Location</label>
                    <select id="section">
                        <option value="TRENDING">Trending Selection</option>
                        <option value="MARATHI">Marathi Specials</option>
                        <option value="SUGGESTED">Suggestions For You</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label for="streamUrlServer1">Stream URL (Server 1)</label>
                    <input type="url" id="streamUrlServer1" placeholder="https://yourserver.com/stream1.mp4" required>
                </div>

                <div class="form-group full-width">
                    <label for="streamUrlServer2">Stream URL (Server 2 - Optional)</label>
                    <input type="url" id="streamUrlServer2" placeholder="https://yourserver.com/stream2.mp4">
                </div>

                <div class="form-group">
                    <label for="imageUrl">Vertical Poster URL</label>
                    <input type="url" id="imageUrl" placeholder="Auto-filled path" required>
                </div>

                <div class="form-group">
                    <label for="backdropUrl">Landscape Backdrop URL</label>
                    <input type="url" id="backdropUrl" placeholder="Auto-filled landscape path" required>
                </div>

                <div class="form-group full-width preview-box">
                    <div>
                        <label style="font-size:0.75rem;">Vertical Preview</label>
                        <img id="verticalPreview" class="preview-img" src="" alt="No Image">
                    </div>
                    <div>
                        <label style="font-size:0.75rem;">Landscape Preview</label>
                        <img id="landscapePreview" class="preview-img" src="" alt="No Image">
                    </div>
                </div>

                <div class="form-group">
                    <label for="duration">Duration / Runtime</label>
                    <input type="text" id="duration" placeholder="e.g., 2h 32m" required>
                </div>

                <div class="form-group">
                    <label for="rating">Rating Score</label>
                    <input type="number" id="rating" step="0.1" placeholder="TMDb / IMDb Score" required>
                </div>

                <div class="form-group full-width toggle-group">
                    <label class="switch">
                        <input type="checkbox" id="isFeatured">
                        <span class="slider"></span>
                    </label>
                    <label for="isFeatured" style="cursor:pointer;">Set as Top Featured Hero Banner</label>
                </div>

            </div>

            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-circle-plus"></i> <span id="btnText">ADD MOVIE TO APP</span>
            </button>
        </form>

        <div id="statusBar" class="status-bar">
            <i id="statusIcon" class="fa-solid"></i>
            <span id="statusText"></span>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🛠️ तुम्हारी अपनी फ़ायरबेस क्रेडेंशियल्स
    const firebaseConfig = {
        apiKey: "AIzaSyBdDxTR0Rsm2cgYRr9lMZXkd0rc7VBmhZg",
        authDomain: "titu-movies.firebaseapp.com",
        projectId: "titu-movies",
        storageBucket: "titu-movies.firebasestorage.app",
        messagingSenderId: "128123629260",
        appId: "1:128123629260:web:d60babebdf14d625571c69"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔑 TMDb API V3 Key
    const TMDB_API_KEY = "91eebcbca31321a0b6f7b54e6bf377b0"; // 👈 तुम्हारी TMDb API Key यहाँ लाइव है भाई!

    const searchInput = document.getElementById('searchTitle');
    const searchResults = document.getElementById('searchResults');
    const form = document.getElementById('movieForm');
    const statusBar = document.getElementById('statusBar');
    const statusIcon = document.getElementById('statusIcon');
    const statusText = document.getElementById('statusText');
    const btnText = document.getElementById('btnText');

    // 🔍 1. लाइव सर्च इनपुट इवेंट लिसनर
    searchInput.addEventListener('input', async () => {
        const query = searchInput.value.trim();
        if (query.length < 2) {
            searchResults.style.display = 'none';
            return;
        }

        try {
            const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.results && data.results.length > 0) {
                searchResults.innerHTML = '';
                data.results.slice(0, 5).forEach(movie => {
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    
                    const posterPath = movie.poster_path ? `https://image.tmdb.org/t/p/w92${movie.poster_path}` : 'https://via.placeholder.com/92x138?text=No+Image';
                    const releaseYear = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';

                    item.innerHTML = `
                        <img src="${posterPath}" alt="poster">
                        <div class="result-details">
                            <span class="result-title">${movie.title}</span>
                            <span class="result-date">Year: ${releaseYear} | Rating: ${movie.vote_average}</span>
                        </div>
                    `;

                    // आइटम सिलेक्शन पर सारा डेटा ऑटो-फ़ेच करने का ट्रिगर
                    item.addEventListener('click', () => fetchFullDetails(movie.id));
                    searchResults.appendChild(item);
                });
                searchResults.style.display = 'block';
            } else {
                searchResults.style.display = 'none';
            }
        } catch (err) {
            console.error("TMDb search error:", err);
        }
    });

    // 🚀 2. मूवी सेलेक्ट होते ही ड्यूरेशन और फुल इमेजेज फ़ेच करना
    async class fetchFullDetails(movieId) {
        searchResults.style.display = 'none';
        searchInput.value = '';

        try {
            // मूवी का व्यक्तिगत विवरण प्राप्त करने के लिए API कॉल
            const detailUrl = `https://api.themoviedb.org/3/movie/${movieId}?api_key=${TMDB_API_KEY}&append_to_response=genres`;
            const res = await fetch(detailUrl);
            const movie = await res.json();

            // इमेजेज पाथ रिज़ॉल्यूशन
            const verticalImg = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : '';
            const landscapeImg = movie.backdrop_path ? `https://image.tmdb.org/t/p/w1280${movie.backdrop_path}` : verticalImg; // बैकअप में वर्टिकल ले लेगा

            // फ़ॉर्म फ़ील्ड्स को ऑटो-फ़िल करना
            document.getElementById('title').value = movie.title;
            document.getElementById('imageUrl').value = verticalImg;
            document.getElementById('backdropUrl').value = landscapeImg;
            document.getElementById('rating').value = movie.vote_average ? movie.vote_average.toFixed(1) : "0.0";
            
            // ज़ैनर एरे को स्ट्रिंग में बदलना
            const genreNames = movie.genres ? movie.genres.map(g => g.name).join(', ') : 'Action';
            document.getElementById('category').value = genreNames;

            // मिनटों को 'Xh Ym' फॉर्मेट में बदलना
            if (movie.runtime) {
                const hours = Math.floor(movie.runtime / 60);
                const minutes = movie.runtime % 60;
                document.getElementById('duration').value = `${hours}h ${minutes}m`;
            } else {
                document.getElementById('duration').value = "2h 00m";
            }

            // इमेज प्रीव्यू लोड करना
            document.getElementById('verticalPreview').src = verticalImg;
            document.getElementById('landscapePreview').src = landscapeImg;

        } catch (err) {
            console.error("TMDb Detail fetching error:", err);
        }
    }

    // बाहर क्लिक होने पर ड्रॉपडाउन बंद करना
    document.addEventListener('click', (e) => {
        if (e.target !== searchInput) {
            searchResults.style.display = 'none';
        }
    });

    // 📤 3. फ़ायरबेस में डेटा सबमिट करना
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        btnText.innerText = "UPLOADING...";
        statusBar.style.display = 'none';

        const timestampId = String(Date.now());

        // ध्यान दें भाई, हमने डेटा स्ट्रक्चर में 'backdropUrl' भी जोड़ दिया है जो डिटेल्स पेज पर काम आएगा
        const movieData = {
            id: timestampId,
            title: document.getElementById('title').value.trim(),
            category: document.getElementById('category').value.trim(),
            contentType: "MOVIE",
            section: document.getElementById('section').value,
            streamUrlServer1: document.getElementById('streamUrlServer1').value.trim(),
            streamUrlServer2: document.getElementById('streamUrlServer2').value.trim(),
            imageUrl: document.getElementById('imageUrl').value.trim(),
            backdropUrl: document.getElementById('backdropUrl').value.trim(), // 👈 नया लैंडस्केप पोस्टर फ़ील्ड
            duration: document.getElementById('duration').value.trim(),
            rating: parseFloat(document.getElementById('rating').value).toFixed(1),
            isFeatured: document.getElementById('isFeatured').checked,
            languages: ["Hindi", "Marathi"],
            downloadLinks: []
        };

        try {
            await addDoc(collection(db, "movies"), movieData);
            
            statusBar.className = "status-bar status-success";
            statusIcon.className = "fa-solid fa-circle-check";
            statusText.innerText = "SUCCESS: Smart Media automatically injected to Firebase.";
            statusBar.style.display = 'flex';
            
            // रीसेट प्रीव्यूज़
            document.getElementById('verticalPreview').src = "";
            document.getElementById('landscapePreview').src = "";
            form.reset();
            
        } catch (error) {
            statusBar.className = "status-bar status-error";
            statusIcon.className = "fa-solid fa-circle-exclamation";
            statusText.innerText = "ERROR: Database push failed. " + error.message;
            statusBar.style.display = 'flex';
        } finally {
            btnText.innerText = "ADD MOVIE TO APP";
        }
    });
</script>

</body>
</html>
